<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="slider">

        <input type="radio" name="slide" id="s1">
        <input type="radio" name="slide" id="s2">
        <input type="radio" name="slide" id="s3">

        <div class="slides">
            <div class="slide s1">Slide 1</div>
            <div class="slide s2">Slide 2</div>
            <div class="slide s3">Slide 3</div>
        </div>

        <div class="nav">
            <label for="s1"></label>
            <label for="s2"></label>
            <label for="s3"></label>
        </div>

    </div>

</body>

</html>
