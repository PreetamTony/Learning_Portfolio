<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li>Home</li>
                <li>Analytics</li>
                <li>Settings</li>
            </ul>
        </aside>

        <div class="main">

            <header class="header">
                <h1>Dashboard</h1>
            </header>

            <section class="cards">
                <div class="card">Users</div>
                <div class="card">Revenue</div>
                <div class="card">Performance</div>
            </section>

            <section class="content">
                <div class="box">Chart Area</div>
                <div class="box">Recent Activity</div>
            </section>

        </div>

    </div>

</body>

</html>
