<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz">
        <div id="quiz-box">
            <h2 id="question"></h2>
            <div id="options"></div>
        </div>
        <div id="result" class="hide">
            <h2>Score: <span id="score"></span>/3</h2>
            <p id="feedback"></p>
            <button id="restart" class="btn">Restart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
